name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  security:
    name: Security scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - run: npm ci
      - run: npm run secret:scan
      - run: npm audit
      - run: npm --prefix apps/web audit
      - run: npm --prefix packages/merkle-tools audit
      - run: npm --prefix circuits/aidshield-groth16 audit

  web:
    name: Web app (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/web/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e
        env:
          NEXT_TELEMETRY_DISABLED: 1

  merkle-tools:
    name: Merkle tools (test + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/merkle-tools
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/merkle-tools/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

  contracts:
    name: Soroban contracts (cargo test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: wasm32-unknown-unknown

      - name: Test disbursement contract
        run: cargo test
        working-directory: contracts/disbursement

      - name: Test Groth16 verifier contract
        run: cargo test
        working-directory: contracts/verifier-groth16
